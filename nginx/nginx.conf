# ============================================================================
# Nginx — Balanceador de carga de Mortal Online.
# Recibe el trafico del cliente (HTTPS en produccion) y lo reparte entre las
# instancias del API Gateway. Soporta upgrade de conexion para WebSocket
# (combate y lobby en tiempo real).
# ============================================================================
worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # No revelar la version de Nginx (fingerprinting): el header Server pasa
    # de "nginx/1.x.y" a solo "nginx".
    server_tokens off;

    # Upgrade de WebSocket: si el cliente pide upgrade, se propaga; si no,
    # la conexion se trata como HTTP normal.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ------------------------------------------------------------------
    # Upstream hacia el API Gateway. En desarrollo corre UNA instancia;
    # para escalar horizontalmente basta con levantar mas instancias del
    # gateway y descomentar/agregar entradas aqui (Nginx balancea con
    # round-robin por defecto).
    # ------------------------------------------------------------------
    upstream api_gateway {
        server api-gateway:8080;
        # Segunda instancia lista para escalado horizontal (descomentar al
        # levantar api-gateway-2 en docker-compose):
        # server api-gateway-2:8080;
    }

    server {
        listen 80;

        # ------------------------------------------------------------------
        # Cabeceras de seguridad del navegador ("always": tambien en errores).
        #  - nosniff: el navegador no adivina tipos MIME (evita ejecutar como
        #    script algo servido como otra cosa).
        #  - frame-ancestors 'none' / DENY: nadie puede meter la app en un
        #    iframe (clickjacking).
        #  - Referrer-Policy: no filtrar la URL completa a sitios externos.
        #  - Permissions-Policy: la app solo usa microfono (chat de voz);
        #    camara y geolocalizacion quedan negadas.
        #  - CSP: solo recursos propios + Google Fonts (unico origen externo
        #    del front); connect-src 'self' cubre el API y los WebSocket
        #    (mismo origen); los sprites/audios van como blob/data.
        # ------------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), geolocation=(), microphone=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' wss: https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        # HSTS: activar SOLO cuando el sitio ya sirva HTTPS de forma estable
        # (obliga al navegador a usar HTTPS durante 6 meses).
        # add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        # ------------------------------------------------------------------
        # HTTPS (produccion): descomentar y montar los certificados.
        # listen 443 ssl;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ------------------------------------------------------------------

        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;

            # Cabeceras para WebSocket (WSS -> WS hacia el gateway)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Conexiones de combate de larga vida
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
