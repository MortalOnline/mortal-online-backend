server:
  port: 8081
  error:
    # incluir el mensaje de ResponseStatusException en el JSON de error para
    # que el cliente pueda mostrarlo (Spring Boot 3 lo oculta por defecto)
    include-message: always

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/authdb}
    username: ${SPRING_DATASOURCE_USERNAME:auth}
    password: ${SPRING_DATASOURCE_PASSWORD:auth}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  # --------------------------------------------------------------------------
  # SMTP para el codigo de verificacion por CORREO (2FA). Configurar por
  # variables de entorno; ejemplo con Gmail (requiere "app password"):
  #   SPRING_MAIL_HOST=smtp.gmail.com
  #   SPRING_MAIL_PORT=587
  #   SPRING_MAIL_USERNAME=micuenta@gmail.com
  #   SPRING_MAIL_PASSWORD=<app-password>
  #   SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH=true
  #   SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE=true
  # Si NO se configura SMTP (desarrollo), el codigo se escribe en el log del
  # servicio en lugar de enviarse.
  # --------------------------------------------------------------------------

security:
  jwt:
    # Secreto HS256 compartido con el gateway y los demas servicios SOLO para
    # VALIDAR tokens. Auth Service es el unico que los EMITE.
    secret: ${JWT_SECRET:mortal-online-dev-secret-0123456789abcdef0123456789abcdef}
    access-ttl-minutes: 60
    refresh-ttl-days: 7
  # anti fuerza-bruta: bloqueo temporal POR CUENTA tras intentos fallidos
  # (complementa el rate limiting por IP del gateway)
  lockout:
    max-attempts: 5
    minutes: 15
  otp:
    # vigencia del codigo de verificacion enviado por correo
    ttl-minutes: 10
    # remitente de los correos (por defecto, el usuario SMTP)
    mail-from: ${MAIL_FROM:${SPRING_MAIL_USERNAME:no-reply@mortalonline.gg}}

# ----------------------------------------------------------------------------
# Correo por API HTTP en la nube (Brevo) — VIA RECOMENDADA: viaja por HTTPS
# (443), que no esta bloqueado en redes universitarias (el SMTP saliente si
# suele estarlo). Crear cuenta gratis en brevo.com, verificar el remitente y
# generar la clave (xkeysib-...). Si la clave esta vacia, se intenta SMTP y,
# en ultima instancia, el codigo queda en el log.
# ----------------------------------------------------------------------------
mail:
  api:
    key: ${BREVO_API_KEY:}
    url: ${MAIL_API_URL:https://api.brevo.com/v3/smtp/email}
    # SOLO desarrollo: true en maquinas con antivirus/proxy que intercepta TLS
    insecure-trust: ${MAIL_API_INSECURE_TRUST:false}
