server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ------------------------------------------------------------------
        # Rutas REST hacia cada microservicio. Cada una añade las cabeceras de
        # seguridad (anti MIME-sniffing, anti clickjacking y sin filtrar la URL
        # de origen). NO se usan default-filters globales: aplicarlos tambien a
        # las rutas /ws/** rompe el handshake de upgrade del WebSocket.
        # ------------------------------------------------------------------
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
          filters:
            - SetResponseHeader=X-Content-Type-Options, nosniff
            - SetResponseHeader=X-Frame-Options, DENY
            - SetResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        - id: lobby-service
          uri: ${LOBBY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/lobby/**
          filters:
            - SetResponseHeader=X-Content-Type-Options, nosniff
            - SetResponseHeader=X-Frame-Options, DENY
            - SetResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        - id: combat-service
          uri: ${COMBAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/combat/**
          filters:
            - SetResponseHeader=X-Content-Type-Options, nosniff
            - SetResponseHeader=X-Frame-Options, DENY
            - SetResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        - id: progress-service
          uri: ${PROGRESS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/progress/**
          filters:
            - SetResponseHeader=X-Content-Type-Options, nosniff
            - SetResponseHeader=X-Frame-Options, DENY
            - SetResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        # ------------------------------------------------------------------
        # WebSocket (STOMP): el gateway propaga el upgrade de conexion SIN
        # filtros de cabeceras (romperian el handshake 101). La autenticacion
        # del socket ocurre en el frame CONNECT de STOMP dentro de cada
        # servicio (ver JwtChannelInterceptor).
        # ------------------------------------------------------------------
        - id: lobby-websocket
          uri: ${LOBBY_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/ws/lobby/**
        - id: combat-websocket
          uri: ${COMBAT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/ws/combat/**

security:
  jwt:
    secret: ${JWT_SECRET:mortal-online-dev-secret-0123456789abcdef0123456789abcdef}

rate-limit:
  # Peticiones por segundo permitidas por IP (limitador en memoria; en
  # produccion se usaria RequestRateLimiter con Redis)
  requests-per-second: ${RATE_LIMIT_RPS:50}

management:
  endpoints:
    web:
      exposure:
        include: health # SOLO health; nunca env/beans/configprops (fugarian secretos)
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never # el health check no revela detalles internos
